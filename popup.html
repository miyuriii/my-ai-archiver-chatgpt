<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatGPT Archiver</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      background: #1a1a1a;
      color: #f0f0f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      padding: 16px;
    }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .header img { width: 32px; height: 32px; border-radius: 6px; }
    .header-title { font-size: 15px; font-weight: 700; color: #00bfff; letter-spacing: 0.3px; }
    .status-bar {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      background: #2a2a2a; border-radius: 8px; padding: 8px 12px; margin-bottom: 14px;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #555; transition: background 0.3s; }
    .status-dot.active { background: #00bfff; box-shadow: 0 0 6px #00bfff; animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-text { font-size: 12px; color: #aaa; letter-spacing: 0.5px; }
    .btn-primary {
      width: 100%; padding: 11px; background: #00bfff; color: #fff;
      font-size: 14px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      letter-spacing: 0.4px; transition: background 0.2s, transform 0.1s;
    }
    .btn-primary:hover { background: #009fdf; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { background: #555; cursor: default; }
    .audio-toggle {
      display: flex; align-items: center; justify-content: space-between;
      background: #242424; border-radius: 8px; padding: 8px 12px;
      margin-top: 6px; margin-bottom: 16px;
    }
    .audio-toggle-label {
      font-size: 12px; color: #aaa; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
    }
    .toggle-switch { position: relative; width: 36px; height: 20px; }
    .toggle-switch input { display: none; }
    .toggle-switch .slider {
      position: absolute; inset: 0; background: #444;
      border-radius: 20px; cursor: pointer; transition: background 0.2s;
    }
    .toggle-switch .slider::before {
      content: ''; position: absolute; width: 14px; height: 14px;
      left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform 0.2s;
    }
    .toggle-switch input:checked + .slider { background: #00bfff; }
    .toggle-switch input:checked + .slider::before { transform: translateX(16px); }
    .divider {
      display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
      color: #666; font-size: 11px; letter-spacing: 0.8px;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #333; }
    .divider svg { flex-shrink: 0; }
    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; letter-spacing: 0.3px; }
    .field-input-wrap { position: relative; }
    .field input {
      width: 100%; background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 6px;
      padding: 7px 34px 7px 10px; color: #f0f0f0; font-size: 12px; outline: none; transition: border-color 0.2s;
    }
    .field input:focus { border-color: #00bfff; }
    .eye-btn {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: #666; padding: 0; line-height: 1; display: flex; align-items: center;
    }
    .eye-btn:hover { color: #bbb; }
    #toast {
      display: none; margin-top: 12px; padding: 8px 12px; background: #2a2a2a;
      border-left: 3px solid #00bfff; border-radius: 5px; font-size: 11px; color: #ccc; line-height: 1.5;
    }
    #toast.error { border-left-color: #e05555; }
    #toast.success { border-left-color: #4caf50; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon-chatgpt-48.png" alt="ChatGPT Archiver" />
    <span class="header-title">ChatGPT Archiver</span>
  </div>
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Standby</span>
  </div>
  <button class="btn-primary" id="saveBtn">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
      <polyline points="17 21 17 13 7 13 7 21"/>
      <polyline points="7 3 7 8 15 8"/>
    </svg>
    Save
  </button>
  <div class="audio-toggle">
    <label class="audio-toggle-label" for="audioToggle">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
      Also save as MP3
    </label>
    <label class="toggle-switch">
      <input type="checkbox" id="audioToggle" />
      <span class="slider"></span>
    </label>
  </div>
  <div class="divider">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="#666">
      <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577
               0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7
               3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236
               1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93
               0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322
               3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552
               3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91
               1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22
               0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592
               24 12.297c0-6.627-5.373-12-12-12"/>
    </svg>
    Setting
  </div>
  <div class="field">
    <label>GitHub Token</label>
    <div class="field-input-wrap">
      <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx" />
      <button class="eye-btn" id="eyeBtn" title="Show/hide token">
        <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 9 C7 16 17 16 22 9"/>
          <line x1="9"  y1="13" x2="8"  y2="16.5"/>
          <line x1="12" y1="14" x2="12" y2="17.5"/>
          <line x1="15" y1="13" x2="16" y2="16.5"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="field">
    <label>Repository (owner/repo)</label>
    <input type="text" id="repoInput" value="miyuriii/my-creative-archive" />
  </div>
  <div class="field">
    <label>Save destination folder</label>
    <input type="text" id="folderInput" value="conversations/chatgpt" />
  </div>
  <button class="btn-primary" id="saveSettingsBtn" style="font-size: 13px;">
    Save settings
  </button>
  <div id="toast"></div>
  <script src="popup.js"></script>
</body>
</html>
